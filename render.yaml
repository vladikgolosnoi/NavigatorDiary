services:
  - type: web
    name: navigator-diary-app
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: >
      npm ci &&
      npx prisma generate --schema apps/server/prisma/schema.prisma &&
      npm run build:web &&
      npm run build:server
    startCommand: >
      npx prisma migrate deploy --schema apps/server/prisma/schema.prisma &&
      (node apps/server/dist/prisma/seed.js || true) &&
      node apps/server/dist/src/main.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: navigator-diary-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: navigator-diary-db
    databaseName: navigator_diary
    user: navigator_diary_user
    plan: free
