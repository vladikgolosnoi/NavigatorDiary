services:
  - type: web
    name: navigator-diary-app
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npx prisma generate --schema apps/server/prisma/schema.prisma && npm run build:web && npm run build:server && node scripts/copy-web-dist.mjs
    preDeployCommand: npx prisma migrate deploy --schema apps/server/prisma/schema.prisma && npm run db:seed -w apps/server
    startCommand: node apps/server/dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: navigator-diary-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: navigator-diary-db
    databaseName: navigator_diary
    plan: free
